server {
    listen 80;
    root /usr/share/nginx/html;

    location ~ \.m3u8$ {
        types { application/vnd.apple.mpegurl m3u8; }
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }

    location ~ \.ts$ {
        types { video/mp2t ts; }
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin "*";
    }
}
