name: Diary Reminder Cron

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  trigger-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Call reminder cron endpoint
        run: |
          curl -sf -X GET "https://bjrepo.vercel.app/api/cron/reminder" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
