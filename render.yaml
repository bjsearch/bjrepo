services:
  - type: web
    name: guarantee-report
    runtime: python
    plan: free
    buildCommand: pip install -r guarantee_report/requirements.txt
    startCommand: gunicorn guarantee_report.webapp:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PHONES
        sync: false
      - key: KAKAO_JS_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
